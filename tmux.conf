##### Prefix #####
# Change prefix from Ctrl-b → Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix


##### Splits #####
#Ctrl-h → split horizontally
bind-key -n C-n split-window -h

# Ctrl-\ → split vertically
bind-key -n C-\\ split-window -v

# Ctrl-x → close current pane
bind-key -n C-x kill-pane


# ────────────── Vim-style pane navigation ──────────────
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-h select-pane -L
bind-key -n C-l select-pane -R


##### Scrollback #####
set -g history-limit 100000


##### Mouse support #####
set -g mouse on


##### Copy mode (vim keys) #####
setw -g mode-keys vi

# enter scroll mode
bind e copy-mode

# Vim-style selection in copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Vim-style copying in copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


##### Pane resizing #####
# Pane resizing with Ctrl+Shift+hjkl
bind-key -n C-S-h resize-pane -L 5
bind-key -n C-S-j resize-pane -D 5
bind-key -n C-S-k resize-pane -U 5
bind-key -n C-S-l resize-pane -R 5


##### Fast scrolling #####
bind -n S-PageUp copy-mode -u

